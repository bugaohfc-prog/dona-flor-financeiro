name: Envio automatico Dona Flor

on:
  workflow_dispatch:
    inputs:
      tipo:
        description: 'AUTO, HOJE, AMANHA ou VENCIDAS'
        type: choice
        options:
          - AUTO
          - HOJE
          - AMANHA
          - VENCIDAS
        required: false
        default: 'AUTO'
      dry_run:
        description: 'Manter true para teste sem envio real'
        type: choice
        options:
          - 'true'
          - 'false'
        required: true
        default: 'true'
      modo_teste:
        description: 'Obrigatorio true para envio real controlado'
        type: choice
        options:
          - 'true'
          - 'false'
        required: true
        default: 'true'
      tipo_destinatario:
        description: 'Preferencia de destinatarios a usar no teste'
        type: choice
        options:
          - todos
          - contas
          - notas
          - resumo
        required: true
        default: 'todos'
      limite_destinatarios:
        description: 'Para envio real controlado deve ser 1'
        required: true
        default: '1'
      empresa_id:
        description: 'Obrigatorio para envio real controlado'
        required: false
        default: ''
      confirmar_envio_real:
        description: 'Para dry_run=false use CONFIRMO_ENVIO_REAL_CONTROLADO'
        required: false
        default: ''
  schedule:
    # 08:00, 09:00 e 20:00 America/Sao_Paulo = 11:00, 12:00 e 23:00 UTC.
    # Minuto 7 evita o topo da hora, quando o GitHub Actions pode atrasar mais.
    - cron: '7 11,12,23 * * *'

permissions:
  contents: read

jobs:
  envio-automatico:
    name: Envio automatico
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || secrets.DRY_RUN }}
      MODO_TESTE: ${{ github.event_name == 'workflow_dispatch' && inputs.modo_teste || 'false' }}

      # Agendamento automatico restrito a CONTAS.
      # Notas e resumo seguem apenas por execucao manual controlada.
      TIPO_DESTINATARIO_TESTE: ${{ github.event_name == 'workflow_dispatch' && inputs.tipo_destinatario || 'contas' }}

      LIMITE_DESTINATARIOS: ${{ github.event_name == 'workflow_dispatch' && inputs.limite_destinatarios || '' }}
      EMPRESA_ID_TESTE: ${{ github.event_name == 'workflow_dispatch' && inputs.empresa_id || '' }}
      CONFIRMAR_ENVIO_REAL: ${{ github.event_name == 'workflow_dispatch' && inputs.confirmar_envio_real || '' }}
      MAIL_TO_FALLBACK: ${{ secrets.MAIL_TO_FALLBACK }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      ALERTA_TIPO: ${{ github.event.inputs.tipo || 'AUTO' }}
      TZ: America/Sao_Paulo
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run envio automatico
        run: node scripts/envio-automatico-dona-flor.mjs
