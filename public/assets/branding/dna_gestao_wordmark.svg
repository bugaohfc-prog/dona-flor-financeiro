<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="DNA Gestão">
  <defs>
    <linearGradient id="dgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F5B56"/>
      <stop offset="100%" stop-color="#1AA187"/>
    </linearGradient>
    <linearGradient id="wordGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0B2D33"/>
      <stop offset="100%" stop-color="#0F5B56"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0B2D33" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g font-family="Inter, Montserrat, Arial, sans-serif">
    <text x="40" y="112" font-size="74" font-weight="800" letter-spacing="-2" fill="#0B2D33">DNA</text>
    <text x="220" y="112" font-size="74" font-weight="650" letter-spacing="-3" fill="#0F5B56">Gestão</text>
    <text x="43" y="165" font-size="22" font-weight="700" letter-spacing="7" fill="#586275">GESTÃO COMPLETA. RESULTADOS REAIS.</text>
  </g>
</svg>